# users.yml — single source of truth for all user configuration
#
# Run `python scripts/generate_config.py` after editing this file to
# regenerate all derived artifacts:
#   docker-compose.override.yml
#   sftp_receiver/entrypoint.sh
#   webserver/configs/users.json          (preserves existing password hashes)
#   grafana/provisioning/datasources/postgres.yml
#   grafana/init_grafana.py               (ORGS/USERS lists)
#   database/migrations/NNN_add_<id>.sql  (only for new users)
#   ssh_keys/<id>/                        (key pair generated if missing)
#
# Then commit the regenerated files alongside this one.
#
# Schema:
#   id            — PostgreSQL role name = SFTP username = user_id in data rows.
#                   The generic current_user RLS policy covers every role
#                   automatically without per-user policy changes.
#   uid           — Linux UID inside the SFTP container (must be unique).
#   display_name  — Human-readable label shown in the webserver UI.
#   grafana_org_id — Grafana organisation number (1-based; 1 = default org).
#   sources       — List of independent CML subnetworks for this user.
#     id          — Subdirectory name: /home/<user_id>/uploads/<source_id>/
#     parser      — Selects the parser implementation for this source.
#                   Available parsers:
#                   "demo_csv_data"   — built-in parser, no extra config needed.
#                   "other_mno_csv"   — OtherMNO format (semicolon, different columns).
#                   "csv_generic"     — configurable parser for simple CSV variants;
#                                       requires csv_config block.
#                   Legacy aliases: "openmrg", "orange_cameroun" map to demo_csv_data.
#
#                   For anything not covered above, create a new parser module in
#                   parser/parsers/<name>/ and add it to load_parser() in
#                   parser/service_logic.py. This is the recommended approach for
#                   non-trivial format differences or non-CSV formats (JSON, etc.).
#     entrypoint  — Which ingestion loop to run for this source (default: "sftp_push").
#                   "sftp_push" — watch a local directory fed by SFTP.
#                   "sftp_pull" — poll a remote SFTP server (not yet implemented).
#                   "api_pull"  — poll an HTTP/JSON API (not yet implemented).
#     csv_config  — (only for parser: csv_generic) Format configuration:
#       read_csv_kwargs          — dict of kwargs forwarded to pd.read_csv
#                                  (e.g. sep, encoding, decimal, skiprows).
#       rawdata_columns          — {source_col: canonical_col} rename map for
#                                  rawdata files.  Canonical names: time,
#                                  cml_id, sublink_id, tsl, rsl.
#       metadata_columns         — same for metadata files.  Canonical names:
#                                  cml_id, sublink_id, site_0_lon, site_0_lat,
#                                  site_1_lon, site_1_lat, frequency,
#                                  polarization, length.
#       timezone                 — IANA timezone (e.g. "Africa/Douala").
#                                  Naive timestamps are localised to this zone
#                                  then converted to UTC.  Omit to leave
#                                  timestamps unchanged.
#       metadata_filename_keyword — substring in filename that identifies
#                                  metadata files (default: "meta").
#       rawdata_filename_keyword  — substring that identifies rawdata files
#                                  (default: anything not matching the metadata
#                                  keyword).
#
# All sources of one user share the same user_id, so Grafana sees their
# data unified.  Each source gets its own named Docker volume and parser
# service (parser_<user_id>_<source_id>).

users:
  - id: demo_openmrg
    uid: 1001
    display_name: OpenMRG Demo
    grafana_org_id: 1
    sources:
      - id: main
        parser: demo_csv_data

  - id: demo_orange_cameroun
    uid: 1002
    display_name: Orange Cameroun Demo
    grafana_org_id: 2
    sources:
      - id: douala
        parser: demo_csv_data

