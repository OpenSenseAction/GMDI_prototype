services:
  archive_generator_openmrg:
    build: ./mno_data_source_simulator
    command: python generate_archive.py --days ${ARCHIVE_DAYS:-1} --interval-seconds ${ARCHIVE_INTERVAL_SECONDS:-10}
    environment:
      - ARCHIVE_OUTPUT_DIR=/archive_output
      - NETCDF_FILE=${OPENMRG_NETCDF_FILE:-/app/example_data/openMRG_cmls_20150827_3months.nc}
      - NETCDF_FILE_URL=${OPENMRG_NETCDF_FILE_URL:-https://bwsyncandshare.kit.edu/s/jSAFftGXcJjQbSJ/download}
    volumes:
      - ./parser/example_data:/app/example_data  # writable so the file can be downloaded
      - archive_data_openmrg:/archive_output

  archive_generator_orange_cameroun:
    build: ./mno_data_source_simulator
    command: python generate_archive.py --days ${ARCHIVE_DAYS_ORANGE_CAMEROUN:-31} --interval-seconds ${ARCHIVE_INTERVAL_SECONDS_ORANGE_CAMEROUN:-900}
    environment:
      - ARCHIVE_OUTPUT_DIR=/archive_output
      - NETCDF_FILE=/app/example_data/cml_raw_douala.nc
      - NETCDF_RSL_VAR=rsl_min
      - NETCDF_TSL_VAR=tsl_min
    volumes:
      - ./parser/example_data:/app/example_data:ro
      - archive_data_orange_cameroun:/archive_output

  mno_simulator_openmrg:
    build: ./mno_data_source_simulator
    restart: unless-stopped
    depends_on:
      sftp_receiver:
        condition: service_healthy
    volumes:
      - ./parser/example_data:/app/example_data  # writable so the file can be downloaded
      - mno_openmrg_data_to_upload:/app/data_to_upload
      - ./ssh_keys:/app/ssh_keys:ro
    environment:
      - NETCDF_FILE=${OPENMRG_NETCDF_FILE:-/app/example_data/openMRG_cmls_20150827_3months.nc}
      - NETCDF_FILE_URL=${OPENMRG_NETCDF_FILE_URL:-https://bwsyncandshare.kit.edu/s/jSAFftGXcJjQbSJ/download}
      - SFTP_HOST=sftp_receiver
      - SFTP_PORT=22
      - SFTP_USERNAME=demo_openmrg
      - SFTP_REMOTE_PATH=/uploads/main
      - SFTP_USE_SSH_KEY=true
      - SFTP_PRIVATE_KEY_PATH=/app/ssh_keys/id_rsa
      - SFTP_KNOWN_HOSTS_PATH=/app/ssh_keys/known_hosts

  mno_simulator_orange_cameroun:
    build: ./mno_data_source_simulator
    restart: unless-stopped
    depends_on:
      sftp_receiver:
        condition: service_healthy
    volumes:
      - ./parser/example_data:/app/example_data:ro
      - mno_orange_cameroun_data_to_upload:/app/data_to_upload
      - ./ssh_keys:/app/ssh_keys:ro
    environment:
      - NETCDF_FILE=/app/example_data/cml_raw_douala.nc
      - SFTP_HOST=sftp_receiver
      - SFTP_PORT=22
      - SFTP_USERNAME=demo_orange_cameroun
      - SFTP_REMOTE_PATH=/uploads/douala
      - SFTP_USE_SSH_KEY=true
      - SFTP_PRIVATE_KEY_PATH=/app/ssh_keys/id_rsa_orange_cameroun
      - SFTP_KNOWN_HOSTS_PATH=/app/ssh_keys/known_hosts
      - NETCDF_RSL_VAR=rsl_min
      - NETCDF_TSL_VAR=tsl_min
      - GENERATION_FREQUENCY_SECONDS=900
      - TIMESTAMPS_PER_FILE=1
      - TIME_RESOLUTION_SECONDS=900
      - UPLOAD_FREQUENCY_SECONDS=900

  # Parser services are defined in docker-compose.override.yml (generated by
  # scripts/generate_config.py from users.yml).  One parser service per source
  # is created automatically when users are added.

  archive_loader_openmrg:
    image: timescale/timescaledb:latest-pg13
    depends_on:
      archive_generator_openmrg:
        condition: service_completed_successfully
      database:
        condition: service_healthy
    environment:
      - PGHOST=database
      - PGUSER=myuser
      - PGPASSWORD=mypassword
      - PGDATABASE=mydatabase
      - ARCHIVE_DATA_DIR=/archive_data
      - ARCHIVE_USER_ID=demo_openmrg
    volumes:
      - archive_data_openmrg:/archive_data:ro
      - ./database/init_archive_data.sh:/init_archive_data.sh:ro
    command: ["/bin/bash", "/init_archive_data.sh"]
    restart: "no"

  archive_loader_orange_cameroun:
    image: timescale/timescaledb:latest-pg13
    depends_on:
      archive_generator_orange_cameroun:
        condition: service_completed_successfully
      database:
        condition: service_healthy
    environment:
      - PGHOST=database
      - PGUSER=myuser
      - PGPASSWORD=mypassword
      - PGDATABASE=mydatabase
      - ARCHIVE_DATA_DIR=/archive_data
      - ARCHIVE_USER_ID=demo_orange_cameroun
    volumes:
      - archive_data_orange_cameroun:/archive_data:ro
      - ./database/init_archive_data.sh:/init_archive_data.sh:ro
    command: ["/bin/bash", "/init_archive_data.sh"]
    restart: "no"

  database:
    build: ./database
    ports:
      - "5432:5432"
    # Tune PostgreSQL memory for an 8 GB VM.
    # shared_buffers: keep recently-used chunks in RAM (default is only 128 MB).
    # effective_cache_size: hints to the planner how much OS page cache is available.
    # work_mem: memory per sort/hash operation; speeds up ORDER BY on large result sets.
    # random_page_cost: tell the planner data is effectively cached, prefer index scans.
    command: >
      postgres
        -c shared_buffers=2GB
        -c effective_cache_size=4GB
        -c work_mem=64MB
        -c maintenance_work_mem=256MB
        -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  processor:
    build: ./processor
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./processor/config:/app/config:ro
      - processor_state:/app/data/state
    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@database:5432/mydatabase

  # Jupyter notebook for rain processing development and validation
  processor_notebook:
    build:
      context: ./processor
      dockerfile: Dockerfile.jupyter
    ports:
      - "9888:8888"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./processor:/app:ro
      - processor_notebook_data:/app/data
    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@database:5432/mydatabase
    profiles:
      - notebook

  webserver:
    build: ./webserver
    ports:
      - "5001:5000"
    depends_on:
      - database
      - sftp_receiver
    environment:
      - DATABASE_URL=postgresql://webserver_role:webserverpassword@database:5432/mydatabase
      - SECRET_KEY=${SECRET_KEY:-changeme-set-a-real-secret-in-production}
      - USERS_CONFIG_PATH=/app/configs/users.json
      - STORAGE_BACKEND=local  # Options: local, s3, minio
      - STORAGE_BASE_PATH=/app/data
    volumes:
      - webserver_data_staged:/app/data/staged
      - webserver_data_archived:/app/data/archived
      - ./webserver/configs:/app/configs:ro

  sftp_receiver:
    image: atmoz/sftp:latest
    ports:
      - "2222:22"
    volumes:
      # Shared SSH host keys (static — not user-specific)
      - ./ssh_keys/sftp_host_ed25519_key:/etc/ssh/ssh_host_ed25519_key:ro
      - ./ssh_keys/sftp_host_rsa_key:/etc/ssh/ssh_host_rsa_key:ro
      # Custom entrypoint (generated by scripts/generate_config.py)
      - ./sftp_receiver/entrypoint.sh:/custom-entrypoint.sh:ro
    entrypoint: ["/custom-entrypoint.sh"]
    # command and per-user volumes/key mounts come from docker-compose.override.yml
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/22"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Optional: MinIO for S3-compatible object storage (uncomment to use)
  # minio:
  #   image: minio/minio:latest
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - minio_data:/data
  #   command: server /data --console-address ":9001"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
  #     interval: 30s
  #     timeout: 20s
  #     retries: 3

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - database
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SERVER_ROOT_URL=http://localhost:5000/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_COOKIE_SAMESITE=none
      - GF_SECURITY_COOKIE_SECURE=false
      # Auth proxy — Grafana trusts the X-WEBAUTH-USER header injected by the
      # Flask proxy (webserver service).  Anonymous access and the login form are
      # disabled so Grafana itself is not reachable without going through the proxy.
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=X-WEBAUTH-USER
      - GF_AUTH_PROXY_HEADER_PROPERTY=username
      - GF_AUTH_PROXY_AUTO_SIGN_UP=true
      # No whitelist needed: port 3000 is not exposed to the host, so only
      # containers in the same Docker Compose network can reach Grafana.
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q 'database'"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot bootstrap: creates org 2, pre-creates Grafana users in their correct
  # org, then exits.  Runs every time the stack starts (idempotent).
  init_grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    depends_on:
      grafana:
        condition: service_healthy
    restart: "no"

  # Integration test runner (run with: docker compose run --rm integration_tests)
  integration_tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    depends_on:
      - sftp_receiver
      - webserver
      - mno_simulator_openmrg
    environment:
      - SFTP_HOST=sftp_receiver
      - SFTP_PORT=22
    volumes:
      - ./tests:/workspace/tests:ro
      - ./ssh_keys:/workspace/ssh_keys:ro
      - ./pyproject.toml:/workspace/pyproject.toml:ro
    network_mode: "service:sftp_receiver"
    profiles:
      - testing

volumes:
  archive_data_openmrg:
  archive_data_orange_cameroun:
  # Per-user SFTP and parser volumes are declared in docker-compose.override.yml
  # (generated by scripts/generate_config.py from users.yml).
  webserver_data_staged:
  webserver_data_archived:
  grafana_data:
  mno_openmrg_data_to_upload:
  mno_orange_cameroun_data_to_upload:
  processor_state:
  processor_notebook_data:
  # minio_data:  # Uncomment if using MinIO