apiVersion: 1

providers:
  - name: 'CML Dashboards (org 1)'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: false
    updateIntervalSeconds: 10
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards/definitions

  # Dashboards for org 2 are copied via the Grafana API by the init_grafana
  # service after org 2 is created (see grafana/init_grafana.py).
