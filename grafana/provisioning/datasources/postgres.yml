apiVersion: 1

datasources:
  # Per-user datasources — each connects as the matching PostgreSQL login role.
  # RLS on cml_metadata/cml_stats and security-barrier views on cml_data ensure
  # that queries only return rows owned by that role (user_id = current_user).
  - name: demo_openmrg
    uid: ds_demo_openmrg
    type: grafana-postgresql-datasource
    access: proxy
    url: database:5432
    database: mydatabase
    user: demo_openmrg
    secureJsonData:
      password: demo_openmrg_password
    jsonData:
      sslmode: disable
    editable: true

  - name: demo_orange_cameroun
    uid: ds_demo_orange_cameroun
    type: grafana-postgresql-datasource
    access: proxy
    url: database:5432
    database: mydatabase
    user: demo_orange_cameroun
    secureJsonData:
      password: demo_orange_cameroun_password
    jsonData:
      sslmode: disable
    editable: true

  # Admin datasource — connects as webserver_role.
  # No RLS bypass: webserver_role sees all tenants' data and is intended for
  # cross-tenant / operator dashboards only.  Not assigned to individual users.
  - name: admin
    uid: ds_admin
    type: grafana-postgresql-datasource
    access: proxy
    url: database:5432
    database: mydatabase
    user: webserver_role
    secureJsonData:
      password: webserverpassword
    jsonData:
      sslmode: disable
    isDefault: false
    editable: true
