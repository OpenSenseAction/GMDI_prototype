apiVersion: 1

datasources:
  # Each Grafana organization has exactly ONE PostgreSQL datasource connecting as
  # the matching PG login role.  RLS on cml_metadata/cml_stats and security-barrier
  # views (cml_data_secure, cml_data_1h_secure) scope all queries to that role's
  # data automatically.
  #
  # Dashboards use a ${datasource} template variable of type "datasource" filtered
  # to grafana-postgresql-datasource.  Because each org has only one such datasource,
  # the variable auto-selects the correct one — no user interaction required.
  #
  # Org 1 (demo_openmrg) datasource is provisioned from this file.
  # Org 2 (demo_orange_cameroun) datasource is created via API by init_grafana.

  # Org 1 — demo_openmrg
  - name: PostgreSQL
    uid: ds_demo_openmrg
    type: grafana-postgresql-datasource
    access: proxy
    orgId: 1
    url: database:5432
    database: mydatabase
    user: demo_openmrg
    secureJsonData:
      password: demo_openmrg_password
    jsonData:
      sslmode: disable
    isDefault: true
    editable: false

# Datasource for org 2 (demo_orange_cameroun) is created via the Grafana API
# by the init_grafana service after org 2 is created (see grafana/init_grafana.py).
