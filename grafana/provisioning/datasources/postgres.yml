# AUTO-GENERATED by scripts/generate_config.py — do not edit by hand.
apiVersion: 1

datasources:
  # Each Grafana organisation has exactly ONE PostgreSQL datasource
  # connecting as the matching PG login role.  RLS on
  # cml_metadata/cml_stats and security-barrier views
  # (cml_data_secure, cml_data_1h_secure) scope all queries to that
  # role's data automatically.
  #
  # Dashboards use a ${datasource} template variable of type
  # 'datasource' filtered to grafana-postgresql-datasource.  Because
  # each org has only one such datasource the variable auto-selects
  # the correct one — no user interaction required.

  # Org 1 — demo_openmrg
  - name: PostgreSQL
    uid: ds_demo_openmrg
    type: grafana-postgresql-datasource
    access: proxy
    orgId: 1
    url: database:5432
    database: mydatabase
    user: demo_openmrg
    secureJsonData:
      password: demo_openmrg_password
    jsonData:
      sslmode: disable
    isDefault: true
    editable: false

  # Org 2 — demo_orange_cameroun
  - name: PostgreSQL
    uid: ds_demo_orange_cameroun
    type: grafana-postgresql-datasource
    access: proxy
    orgId: 2
    url: database:5432
    database: mydatabase
    user: demo_orange_cameroun
    secureJsonData:
      password: demo_orange_cameroun_password
    jsonData:
      sslmode: disable
    isDefault: true
    editable: false

# Note: provisioning files only apply to Grafana organisations that
# already exist when Grafana starts.  Org 1 (the default) always
# exists.  Additional orgs are created by the init_grafana service
# (grafana/init_grafana.py) before it triggers a provisioning reload.
