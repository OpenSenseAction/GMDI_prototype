# docker-compose.override.yml
# AUTO-GENERATED by scripts/generate_config.py — do not edit by hand.
# Edit users.yml then re-run the generator.
#
# Adds per-user parser services and wires the SFTP receiver with
# per-user upload subdirectories and authorised-key mounts.

services:
  sftp_receiver:
    command: ["demo_openmrg::1001:1001:uploads/main", "demo_orange_cameroun::1002:1002:uploads/douala"]
    volumes:
      - sftp_demo_openmrg_main:/home/demo_openmrg/uploads/main
      - ./ssh_keys/demo_openmrg/authorized_keys:/home/demo_openmrg/.ssh/keys/authorized_keys:ro
      - sftp_demo_orange_cameroun_douala:/home/demo_orange_cameroun/uploads/douala
      - ./ssh_keys/demo_orange_cameroun/authorized_keys:/home/demo_orange_cameroun/.ssh/keys/authorized_keys:ro

  parser_demo_openmrg_main:
    build: ./parser
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://demo_openmrg:demo_openmrg_password@database:5432/mydatabase
      - USER_ID=demo_openmrg
      - PARSER_INCOMING_DIR=/app/data/incoming
      - PARSER_ARCHIVED_DIR=/app/data/archived
      - PARSER_QUARANTINE_DIR=/app/data/quarantine
      - PARSER_ENABLED=true
      - PROCESS_EXISTING_ON_STARTUP=true
      - LOG_LEVEL=INFO
    volumes:
      - sftp_demo_openmrg_main:/app/data/incoming
      - parser_demo_openmrg_main_archived:/app/data/archived
      - parser_demo_openmrg_main_quarantine:/app/data/quarantine
    restart: unless-stopped

  parser_demo_orange_cameroun_douala:
    build: ./parser
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://demo_orange_cameroun:demo_orange_cameroun_password@database:5432/mydatabase
      - USER_ID=demo_orange_cameroun
      - PARSER_INCOMING_DIR=/app/data/incoming
      - PARSER_ARCHIVED_DIR=/app/data/archived
      - PARSER_QUARANTINE_DIR=/app/data/quarantine
      - PARSER_ENABLED=true
      - PROCESS_EXISTING_ON_STARTUP=true
      - LOG_LEVEL=INFO
    volumes:
      - sftp_demo_orange_cameroun_douala:/app/data/incoming
      - parser_demo_orange_cameroun_douala_archived:/app/data/archived
      - parser_demo_orange_cameroun_douala_quarantine:/app/data/quarantine
    restart: unless-stopped

volumes:
  sftp_demo_openmrg_main:
  parser_demo_openmrg_main_archived:
  parser_demo_openmrg_main_quarantine:
  sftp_demo_orange_cameroun_douala:
  parser_demo_orange_cameroun_douala_archived:
  parser_demo_orange_cameroun_douala_quarantine:
